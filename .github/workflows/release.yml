name: Build and release on tag

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify manifest version matches tag
        run: |
          tag="${GITHUB_REF_NAME}"
          tag_version="${tag#v}"
          manifest_version="$(jq -r '.version' manifest.json)"
          echo "tag: $tag_version | manifest version: $manifest_version"
          if [ "$tag_version" != "$manifest_version" ]; then
            echo "::error::Tag ($tag_version) does not match manifest version ($manifest_version). Bump \"version\" in manifest.json to match the tag."
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Build and test
        run: |
          npm ci
          npm test
          npm run lint
          npm run build

      - name: Build extension zip
        run: |
          zip_name="page-snap-${GITHUB_REF_NAME}.zip"
          echo "ZIP_NAME=$zip_name" >> "$GITHUB_ENV"
          # dist/ holds exactly the runtime files; zip it all so new entry
          # points can never be silently left out of the package.
          (cd dist && zip -r "../$zip_name" . -x "icon/icon.svg")
          echo "--- package contents ---"
          unzip -l "$zip_name"

      - name: Create release with zip attached
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # If the tag arrived via a UI-created release, attach to it instead.
          gh release create "${GITHUB_REF_NAME}" "$ZIP_NAME" \
            --title "Page Snap ${GITHUB_REF_NAME}" \
            --generate-notes \
          || gh release upload "${GITHUB_REF_NAME}" "$ZIP_NAME" --clobber
